  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;\n  --green:#0d6b40;--green-light:#d1fae5;\n  --red:#991b1b;--red-light:#fee2e2;\n  --r-sm:4px;--r-md:6px;--r-lg:10px;--r-xl:14px;\n  --sh-sm:0 1px 3px rgba(0,0,0,.07);--sh-md:0 4px 12px rgba(0,0,0,.09);\n}\n*{box-sizing:border-box;margin:0;padding:0;}\nbody{font-family:'Inter',sans-serif;background:var(--gray-50);color:var(--gray-800);font-size:14px;line-height:1.5;}\n\n/* HEADER */\n.hdr{background:var(--navy);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:16px;}\n.hdr-left{display:flex;align-items:center;gap:16px;flex-shrink:0;}\n.pt-logo{display:flex;align-items:center;gap:10px;}\n.pt-logo-mark{display:flex;align-items:center;justify-content:center;}\n.pt-wordmark{font-family:'Inter',sans-serif;font-weight:700;font-size:17px;color:#fff;letter-spacing:-.3px;}\n.cbadge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:var(--r-md);padding:3px 10px;font-size:11px;font-weight:500;color:rgba(255,255,255,.88);display:flex;align-items:center;gap:6px;}\n.cav{width:18px;height:18px;border-radius:3px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;}\n.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}\n.hbtn{padding:5px 11px;border-radius:var(--r-md);font-size:11px;font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;gap:5px;transition:all .15s;}\n.hbtn-lib{background:rgba(255,255,255,.08);color:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.16);}\n.hbtn-lib:hover{background:rgba(255,255,255,.14);}\n.hbtn-add{background:var(--orange);color:#fff;}\n.hbtn-add:hover{background:#a84208;}\n.livebadge{background:var(--teal);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.4px;}\n.livedate{font-size:11px;color:rgba(255,255,255,.5);}\n.uav{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;cursor:pointer;}\n\n/* CONNECTED SOURCES BAR */\n.src-bar{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 28px;height:34px;display:flex;align-items:center;gap:6px;position:sticky;top:54px;z-index:99;}\n.src-label{font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;margin-right:6px;white-space:nowrap;}\n.src-badge{display:flex;align-items:center;gap:5px;padding:3px 10px;border:1px solid var(--gray-200);border-radius:99px;font-size:10px;font-weight:500;color:var(--gray-600);background:var(--gray-50);white-space:nowrap;}\n.src-badge svg{width:14px;height:14px;flex-shrink:0;}\n.src-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);flex-shrink:0;box-shadow:0 0 0 2px var(--teal-light);}\n.src-divider{width:1px;height:16px;background:var(--gray-200);margin:0 2px;}\n\n/* TAB NAV */\n.tnav{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 28px;display:flex;align-items:center;position:sticky;top:88px;z-index:98;}\n.tbtn{padding:12px 16px;font-size:12px;font-weight:500;color:var(--gray-500);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;}\n.tbtn:hover{color:var(--navy);}\n.tbtn.active{color:var(--navy);border-bottom-color:var(--navy);}\n.aibadge{background:var(--navy);color:#fff;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:.3px;}\n\n/* MAIN */\n.main{padding:24px;max-width:1400px;margin:0 auto;}\n.tab{display:none;}.tab.active{display:block;}\n\n/* CARDS */\n.card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;box-shadow:var(--sh-sm);}\n.mb16{margin-bottom:16px;}.mb20{margin-bottom:20px;}.mb24{margin-bottom:24px;}\n.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}\n.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}\n.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}\n.sec-ttl{font-family:'Poppins',sans-serif;font-weight:600;font-size:14px;color:var(--navy);}\n.card-ttl{font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:var(--navy);margin-bottom:3px;}\n.card-sub{font-size:11px;color:var(--gray-500);}\n\n/* BUTTONS */\n.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r-md);font-size:11px;font-weight:500;cursor:pointer;border:none;transition:all .15s;}\n.btn-p{background:var(--navy);color:#fff;}.btn-p:hover{background:var(--navy-mid);}\n.btn-s{background:#fff;color:var(--gray-700);border:1px solid var(--gray-300);}.btn-s:hover{background:var(--gray-50);}\n.btn-g{background:transparent;color:var(--navy);border:1px solid var(--gray-300);}.btn-g:hover{background:var(--navy-light);}\n.btn-sm{padding:3px 9px;font-size:10px;}\n.btn-q{background:var(--green-light);color:var(--green);border:1px solid #6ee7b7;cursor:default;}\n.btn-w{background:#fff;color:var(--navy);font-weight:600;border:1px solid var(--gray-300);}.btn-w:hover{background:var(--gray-50);}\n.btn-ow{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.35);}.btn-ow:hover{background:rgba(255,255,255,.08);}\n\n/* SCORE CARDS */\n.scard{text-align:center;padding:20px 16px;position:relative;overflow:hidden;}\n.snum{font-family:'Poppins',sans-serif;font-weight:700;font-size:42px;line-height:1;margin-bottom:2px;}\n.slbl{font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;letter-spacing:.2px;}\n.sring{position:absolute;top:-18px;right:-18px;opacity:.06;}\n.sg{color:var(--green);}.sy{color:var(--amber);}.sr{color:var(--rose);}\n.sbg-g{background:linear-gradient(135deg,#f0fdf9,#d1fae5);border-color:#6ee7b7;}\n.sbg-y{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-color:#fcd34d;}\n.sbg-r{background:linear-gradient(135deg,#fff1f2,#fee2e2);border-color:#fecdd3;}\n.sdelta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:3px;margin-bottom:4px;}\n.dup{background:var(--green-light);color:var(--green);}\n.ddn{background:var(--red-light);color:var(--red);}\n.dfl{background:var(--gray-100);color:var(--gray-600);}\n\n/* FILTER PILLS */\n.fpill{padding:3px 9px;border-radius:99px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid var(--gray-300);background:#fff;color:var(--gray-600);transition:all .15s;}\n.fpill:hover{border-color:var(--navy);color:var(--navy);}\n.fpill.active{background:var(--navy);border-color:var(--navy);color:#fff;}\n.fsel{padding:4px 9px;border:1px solid var(--gray-300);border-radius:var(--r-md);font-size:11px;font-family:'Inter',sans-serif;color:var(--gray-700);outline:none;background:#fff;cursor:pointer;}\n.fsel:focus{border-color:var(--navy);}\n.fsel.af{border-color:var(--navy);background:var(--navy-light);color:var(--navy);font-weight:600;}\n\n/* COMPLETENESS DASHBOARD */\n.comp-tier-card{position:relative;background:linear-gradient(180deg,#fbfcfe 0%,#f4f7fb 100%);border:1px solid var(--gray-200);border-radius:var(--r-md);padding:14px;display:flex;align-items:center;gap:14px;}\n.comp-tier-card .ring-wrap{position:relative;width:74px;height:74px;flex-shrink:0;}\n.comp-tier-card .ring-pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--navy);line-height:1;}\n.comp-tier-card .ring-pct small{display:block;font-size:8px;font-weight:500;color:var(--gray-500);margin-top:1px;letter-spacing:.4px;text-transform:uppercase;}\n.comp-tier-card .tier-meta{flex:1;min-width:0;}\n.comp-tier-card .tier-name{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}\n.comp-tier-card .tier-tag{display:inline-block;padding:1px 6px;background:var(--gray-100);color:var(--gray-600);border-radius:3px;font-size:8px;font-weight:600;letter-spacing:.3px;text-transform:none;}\n.comp-tier-card .tier-tag.t1{background:#eaf0fb;color:var(--navy);}\n.comp-tier-card .tier-tag.t2{background:#e0f4f0;color:var(--green);}\n.comp-tier-card .tier-tag.t3{background:#eef3fa;color:var(--gray-600);}\n.comp-tier-card .tier-desc{font-size:10px;color:var(--gray-500);line-height:1.4;margin-bottom:6px;}\n.comp-tier-card .tier-stats{display:flex;gap:10px;font-size:10px;color:var(--gray-600);}\n.comp-tier-card .tier-stats strong{color:var(--navy);font-weight:600;}\n.comp-tier-card .tier-delta{font-size:10px;color:var(--green);font-weight:600;}\n\n.comp-thru-card{background:var(--navy);color:#fff;border-radius:var(--r-md);padding:14px;display:flex;flex-direction:column;justify-content:space-between;}\n.comp-thru-card .lbl{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.65);}\n.comp-thru-card .big{font-size:28px;font-weight:700;line-height:1;margin:6px 0 4px;letter-spacing:-.5px;}\n.comp-thru-card .sub{font-size:10px;color:rgba(255,255,255,.7);line-height:1.4;}\n.comp-thru-card .row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.12);}\n.comp-thru-card .row .k{font-size:9px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px;}\n.comp-thru-card .row .v{font-size:13px;font-weight:600;color:#fff;}\n\n.mix-row{display:grid;grid-template-columns:60px 1fr 70px;align-items:center;gap:10px;margin-bottom:8px;font-size:11px;}\n.mix-row .lbl{color:var(--gray-700);font-weight:500;}\n.mix-row .bar{height:14px;background:var(--gray-100);border-radius:3px;overflow:hidden;position:relative;}\n.mix-row .fill{height:100%;border-radius:3px;}\n.mix-row .val{text-align:right;color:var(--navy);font-weight:600;font-variant-numeric:tabular-nums;}\n.mix-row .val small{color:var(--gray-500);font-weight:500;font-size:9px;margin-left:3px;}\n\n/* EXEC SUMMARY */\n.execsum{background:var(--navy);border-radius:var(--r-lg);padding:16px 20px;color:#fff;margin-bottom:20px;display:flex;gap:16px;align-items:flex-start;}\n.es-ttl{font-size:9px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}\n.es-txt{font-size:12px;line-height:1.7;color:rgba(255,255,255,.88);}\n.es-txt strong{color:#fff;}\n.hl-g{color:#6ee7b7;font-weight:600;}.hl-r{color:#fda4af;font-weight:600;}.hl-y{color:#fcd34d;font-weight:600;}\n\n/* FINANCIAL IMPACT PANEL */\n.fin-panel{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;margin-bottom:20px;box-shadow:var(--sh-sm);}\n.fin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}\n.fin-title{font-family:'Poppins',sans-serif;font-weight:600;font-size:14px;color:var(--navy);}\n.fin-sources{display:flex;align-items:center;gap:6px;}\n.fin-src-badge{display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:600;border:1px solid var(--gray-200);color:var(--gray-500);}\n.fin-src-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);}\n.fin-toggle{display:flex;gap:0;border:1px solid var(--gray-200);border-radius:var(--r-md);overflow:hidden;}\n.fin-toggle-btn{padding:4px 12px;font-size:10px;font-weight:600;cursor:pointer;border:none;background:#fff;color:var(--gray-500);transition:all .15s;}\n.fin-toggle-btn.active{background:var(--navy);color:#fff;}\n.fin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}\n.fin-card{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r-md);padding:12px 14px;}\n.fin-card-label{font-size:10px;color:var(--gray-500);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}\n.fin-card-val{font-family:'Poppins',sans-serif;font-weight:700;font-size:20px;color:var(--navy);}\n.fin-card-delta{font-size:10px;margin-top:2px;font-weight:600;}\n.fin-card-delta.up{color:var(--green);}\n.fin-card-delta.dn{color:var(--red);}\n.fin-bar-section{display:grid;grid-template-columns:1fr 1fr;gap:16px;}\n.fin-bar-card{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r-md);padding:14px;}\n.fin-bar-title{font-size:11px;font-weight:600;color:var(--navy);margin-bottom:10px;}\n.fin-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}\n.fin-bar-lbl{font-size:10px;color:var(--gray-600);width:100px;flex-shrink:0;}\n.fin-bar-track{flex:1;background:var(--gray-200);border-radius:99px;height:5px;}\n.fin-bar-fill{height:5px;border-radius:99px;background:var(--navy);}\n.fin-bar-val{font-size:10px;font-weight:600;color:var(--navy);min-width:36px;text-align:right;font-family:'Poppins',sans-serif;}\n.fin-insight{background:var(--navy-light);border-radius:var(--r-md);padding:10px 14px;font-size:11px;color:var(--navy);line-height:1.6;margin-top:12px;}\n.fin-insight strong{font-weight:600;}\n\n/* HEATMAP */\n.hm-grid{display:grid;grid-template-columns:130px repeat(3,1fr);gap:2px;font-size:12px;}\n.hm-hdr{padding:6px 8px;font-size:10px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;text-align:center;}\n.hm-lbl{padding:8px 10px;font-weight:600;color:var(--navy);display:flex;align-items:center;font-size:11px;}\n.hm-cell{padding:9px 6px;border-radius:var(--r-sm);text-align:center;font-weight:700;font-size:12px;font-family:'Poppins',sans-serif;transition:transform .1s;}\n.hm-cell:hover{transform:scale(1.03);}\n\n/* MOVERS */\n.mv-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100);}\n.mv-row:last-child{border-bottom:none;}\n.mv-name{flex:1;font-size:12px;font-weight:500;color:var(--navy);}\n.mv-sub{font-size:10px;color:var(--gray-400);}\n.mv-up{font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;color:var(--green);}\n.mv-dn{font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;color:var(--red);}\n\n/* TIMELINE */\n.tl{position:relative;padding-left:18px;}\n.tl::before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:1px;background:var(--gray-200);}\n.tl-item{position:relative;padding:0 0 16px 18px;}\n.tl-item:last-child{padding-bottom:0;}\n.tl-dot{position:absolute;left:-13px;top:3px;width:10px;height:10px;border-radius:50%;border:2px solid #fff;}\n.tl-date{font-size:9px;font-family:'DM Mono',monospace;color:var(--gray-400);margin-bottom:1px;}\n.tl-ttl{font-size:11px;font-weight:600;color:var(--navy);margin-bottom:2px;}\n.tl-desc{font-size:10px;color:var(--gray-500);line-height:1.5;}\n.tl-imp{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;margin-top:3px;}\n.ti-up{background:var(--green-light);color:var(--green);}\n.ti-pend{background:var(--gray-100);color:var(--gray-500);}\n.ti-dn{background:var(--red-light);color:var(--red);}\n\n/* TABLES */\n.dt{width:100%;border-collapse:collapse;font-size:12px;}\n.dt th{text-align:left;padding:7px 10px;font-size:10px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--gray-200);background:var(--gray-50);}\n.dt td{padding:9px 10px;border-bottom:1px solid var(--gray-100);color:var(--gray-700);}\n.dt tr:hover td{background:var(--gray-50);}\n.dt tr:last-child td{border-bottom:none;}\n.sp{display:inline-flex;align-items:center;justify-content:center;width:40px;padding:2px 0;border-radius:var(--r-sm);font-size:11px;font-weight:700;}\n.sp-g{background:var(--green-light);color:var(--green);}\n.sp-y{background:var(--amber-light);color:var(--amber);}\n.sp-r{background:var(--red-light);color:var(--red);}\n.tu{color:var(--green);font-weight:600;}.tf{color:var(--gray-400);font-weight:600;}.td2{color:var(--red);font-weight:600;}\n\n/* STAT ROW */\n.sr2{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--gray-100);}\n.sr2:last-child{border-bottom:none;}\n.sr-l{font-size:11px;color:var(--gray-600);}\n.sr-v{font-size:12px;font-weight:600;color:var(--navy);font-family:'Poppins',sans-serif;}\n\n/* METRIC CARD */\n.mc{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r-md);padding:11px 13px;}\n.mc-l{font-size:10px;color:var(--gray-500);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}\n.mc-v{font-family:'Poppins',sans-serif;font-weight:700;font-size:19px;color:var(--navy);}\n/* ── NUMBER FONT SYSTEM ──────────────────────────────────────\n   Poppins  → all display numbers (scores, counts, $, %)\n   DM Mono  → all tabular reference data (SKU codes, dates, IDs)\n   ---------------------------------------------------------- */\n.num-p{font-family:'Poppins',sans-serif;font-weight:700;}\n.num-m{font-family:'DM Mono',monospace;font-weight:500;}\n/* Score badges */\n.sp{font-family:'Poppins',sans-serif !important;font-weight:700 !important;}\n/* Metric cards */\n.mc-v{font-family:'Poppins',sans-serif !important;font-weight:700 !important;}\n/* Scorecard big number */\n.snum{font-family:'Poppins',sans-serif !important;font-weight:700 !important;}\n/* Financial cards */\n.fin-card-val{font-family:'Poppins',sans-serif !important;font-weight:700 !important;}\n/* Pipeline phase counts */\n.pipe-cnt{font-family:'Poppins',sans-serif !important;font-weight:700 !important;}\n/* Mover deltas */\n.mv-up,.mv-dn{font-family:'Poppins',sans-serif !important;font-weight:700 !important;}\n/* Table numeric cells — Poppins for scores/%, DM Mono for SKU/ID columns */\n.dt td{font-family:'Poppins',sans-serif;font-weight:500;}\n.dt td:first-child{font-family:'Inter',sans-serif;font-weight:500;}\n/* SKU/code cells get mono explicitly */\n.dt td[data-mono]{font-family:'DM Mono',monospace !important;font-weight:500 !important;}\n/* Stat row values — Poppins: these are display numbers, not codes */\n.sr-v{font-family:'Poppins',sans-serif !important;}\n\n/* CAT BADGES */\n.cb{display:inline-block;padding:1px 7px;border-radius:3px;font-size:9px;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;}\n.cb-e{background:var(--blue-light);color:var(--blue);}\n.cb-h{background:#fce7f3;color:#9d174d;}\n.cb-p{background:#d1fae5;color:var(--green);}\n.cb-l{background:var(--amber-light);color:var(--amber);}\n.cb-v{background:var(--purple-light);color:var(--purple);}\n.cb-t{background:var(--red-light);color:var(--red);}\n\n/* PIPELINE */\n.pipe-wrap{display:flex;align-items:stretch;width:100%;}\n.pipe-ph{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 8px;cursor:pointer;text-align:center;transition:all .15s;border:1.5px solid transparent;}\n.pipe-ph:hover{opacity:.9;transform:translateY(-1px);}\n.pipe-arr{display:flex;align-items:center;padding:0 3px;flex-shrink:0;}\n.pipe-arr-inner{position:relative;width:20px;height:1px;background:var(--gray-300);}\n.pipe-arr-inner::after{content:'▶';position:absolute;right:-6px;top:50%;transform:translateY(-50%);font-size:8px;color:var(--gray-400);line-height:1;}\n.pipe-icon-wrap{width:32px;height:32px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;margin-bottom:7px;}\n.pipe-lbl{font-size:11px;font-weight:700;margin-bottom:3px;}\n.pipe-cnt{font-family:'Poppins',sans-serif;font-weight:700;font-size:20px;line-height:1;}\n.pipe-sub{font-size:9px;margin-top:2px;opacity:.7;}\n\n/* PROGRESS */\n.pw{background:var(--gray-200);border-radius:99px;height:6px;overflow:hidden;}\n.pb{height:100%;border-radius:99px;}\n\n/* AGENTIC */\n.ag-wrap{display:flex;gap:20px;min-height:500px;}\n.ag-side{width:250px;flex-shrink:0;}\n.ag-main{flex:1;display:flex;flex-direction:column;}\n.chat-area{flex:1;overflow-y:auto;padding:18px;background:var(--gray-50);border-radius:var(--r-lg) var(--r-lg) 0 0;border:1px solid var(--gray-200);border-bottom:none;max-height:480px;}\n.chat-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border:1px solid var(--gray-200);border-radius:0 0 var(--r-lg) var(--r-lg);}\n.chat-inp{flex:1;border:none;outline:none;font-size:12px;font-family:'Inter',sans-serif;color:var(--gray-700);background:transparent;}\n.chat-inp::placeholder{color:var(--gray-400);}\n.chat-send{background:var(--navy);color:#fff;border:none;border-radius:var(--r-md);padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;}\n.msg{margin-bottom:14px;}\n.msg-u{display:flex;justify-content:flex-end;}\n.msg-a{display:flex;gap:8px;}\n.bub-u{background:var(--navy);color:#fff;padding:9px 13px;border-radius:var(--r-lg) var(--r-lg) 3px var(--r-lg);max-width:75%;font-size:12px;line-height:1.5;}\n.bub-a{background:#fff;border:1px solid var(--gray-200);padding:11px 14px;border-radius:3px var(--r-lg) var(--r-lg) var(--r-lg);flex:1;font-size:12px;line-height:1.6;}\n.ai-av{width:28px;height:28px;border-radius:var(--r-md);background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--teal);flex-shrink:0;}\n.mono{background:var(--gray-800);border-radius:var(--r-md);padding:10px 12px;margin-top:8px;font-family:'DM Mono',monospace;font-size:10px;color:#e2e8f0;line-height:1.8;}\n.mh{color:#6ee7b7;font-weight:500;}.mw{color:#fcd34d;}.md{color:#94a3b8;}\n.mtag{font-size:9px;color:var(--gray-400);margin-top:5px;font-family:'DM Mono',monospace;}\n.sq{padding:9px 12px;background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-md);font-size:11px;color:var(--gray-600);cursor:pointer;margin-bottom:6px;transition:all .15s;line-height:1.4;}\n.sq:hover{background:var(--navy-light);border-color:var(--navy);color:var(--navy);}\n.slbl2{font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}\n.typing span{display:inline-block;width:5px;height:5px;background:var(--gray-400);border-radius:50%;margin:0 2px;animation:bounce 1.2s infinite;}\n.typing span:nth-child(2){animation-delay:.2s;}.typing span:nth-child(3){animation-delay:.4s;}\n@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}\n\n/* LIBRARY */\n.lib-sb{width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:var(--r-lg);font-size:13px;font-family:'Inter',sans-serif;outline:none;background:#fff;}\n.lib-sb:focus{border-color:var(--navy);}\n.lib-wrap{display:flex;gap:18px;}\n.lib-filt{width:190px;flex-shrink:0;}\n.filt-sec{margin-bottom:18px;}\n.filt-lbl{font-size:9px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;}\n.filt-opt{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:11px;color:var(--gray-600);cursor:pointer;}\n.filt-opt input{accent-color:var(--navy);}\n.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}\n.pc{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);overflow:hidden;transition:box-shadow .15s,transform .15s;}\n.pc:hover{box-shadow:var(--sh-md);transform:translateY(-1px);}\n.pc-img{height:72px;display:flex;align-items:center;justify-content:center;}\n.pc-body{padding:11px;}\n.pc-brand{font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.4px;}\n.pc-name{font-size:11px;font-weight:600;color:var(--navy);margin:2px 0 5px;line-height:1.3;}\n.pc-attrs{font-size:10px;color:var(--gray-500);line-height:1.5;margin-bottom:7px;}\n.pn{font-family:'DM Mono',monospace;font-size:9px;color:var(--gray-400);margin-bottom:7px;}\n.ua{border:1.5px dashed var(--gray-300);border-radius:var(--r-lg);padding:28px;text-align:center;transition:all .15s;cursor:pointer;}\n.ua:hover{border-color:var(--navy);background:var(--navy-light);}\n\n/* MODAL */\n.moverlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,20,60,.55);z-index:200;align-items:center;justify-content:center;}\n.moverlay.open{display:flex;}\n.modal{background:#fff;border-radius:var(--r-xl);padding:26px;width:500px;max-width:95vw;box-shadow:var(--sh-md);max-height:90vh;overflow-y:auto;}\n.modal-ttl{font-family:'Poppins',sans-serif;font-weight:700;font-size:17px;color:var(--navy);margin-bottom:5px;}\n.modal-sub{font-size:12px;color:var(--gray-500);margin-bottom:18px;}\n.fl{font-size:11px;font-weight:600;color:var(--gray-700);margin-bottom:5px;display:block;}\n.fs{width:100%;padding:8px 10px;border:1px solid var(--gray-300);border-radius:var(--r-md);font-size:12px;font-family:'Inter',sans-serif;color:var(--gray-700);outline:none;margin-bottom:12px;}\n.fs:focus{border-color:var(--navy);}\n.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}\n\n/* INSIGHT */\n.insight{background:var(--navy-light);border:1px solid #c7d2ea;border-radius:var(--r-lg);padding:14px 18px;display:flex;gap:10px;align-items:flex-start;}\n.ins-ico{flex-shrink:0;margin-top:1px;}\n.ins-txt{font-size:12px;color:var(--navy);line-height:1.6;}\n.ins-txt strong{font-weight:600;}\n\n/* DOWNLOAD CARD */\n.dlcard{background:var(--navy);border-radius:var(--r-lg);padding:22px;color:#fff;}\n\n/* TOAST */\n.tc{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:6px;}\n.toast{background:var(--navy);color:#fff;padding:10px 16px;border-radius:var(--r-lg);font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:var(--sh-md);animation:tIn .3s ease;max-width:300px;}\n.ti2{color:var(--teal);font-size:14px;}\n@keyframes tIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}\n@keyframes tOut{from{transform:translateX(0);opacity:1;}to{transform:translateX(100%);opacity:0;}}\n.toast.out{animation:tOut .3s ease forwards;}\n.divider{height:1px;background:var(--gray-200);margin:18px 0;}\n.pi{font-size:10px;color:var(--red);font-style:italic;}\n\n/* PRIORITY SECTION — reduc =\"1.3\"><\u002Fcircle><path d=\"M7 4v3l2 1.5\" stroke=\"var(--navy)\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div><div style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:var(--navy)\">Priority Scoring Model<\u002Fdiv><div style=\"font-size:10px;color:var(--gray-500)\">Search · Conversion · Data Quality · 0–100 output<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:14px\">\n        <!-- S1 -->\n        <div style=\"background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r-md);padding:12px 14px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:5px\">\n            <div style=\"display:flex;align-items:center;gap:6px\">\n              <span style=\"font-size:9px;font-weight:700;background:#dbeafe;color:#1e40af;padding:1px 6px;border-radius:3px;font-family:'DM Mono',monospace\">Search<\u002Fspan>\n              <div style=\"font-size:11px;font-weight:700;color:var(--navy)\">Search Score<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-size:9px;font-family:'DM Mono',monospace;font-weight:700;color:#1e40af;background:#dbeafe;padding:2px 8px;border-radius:3px\">35%<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:10px;color:var(--gray-500);margin-bottom:7px\">How badly does this SKU underperform on Google relative to its ranking position? Measures how your SKUs perform on Google relative to their ranking position.<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:4px;margin-bottom:3px\">\n            <div style=\"width:35%;height:4px;border-radius:99px;background:#1d4ed8\"><\u002Fdiv>\n            <span style=\"font-size:9px;color:var(--gray-500)\">Weight in formula — 35%<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:9px;color:var(--gray-400);margin-top:4px\">Source: Google Search Console · impressions, clicks, CTR, avg. position per SKU<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- S2 -->\n        <div style=\"background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r-md);padding:12px 14px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:5px\">\n            <div style=\"display:flex;align-items:center;gap:6px\">\n              <span style=\"font-size:9px;font-weight:700;background:var(--green-light);color:var(--green);padding:1px 6px;border-radius:3px;font-family:'DM Mono',monospace\">Conversion<\u002Fspan>\n              <div style=\"font-size:11px;font-weight:700;color:var(--navy)\">Conversion Score<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-size:9px;font-family:'DM Mono',monospace;font-weight:700;color:var(--green);background:var(--green-light);padding:2px 8px;border-radius:3px\">65%<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:10px;color:var(--gray-500);margin-bottom:7px\">Carries more weight — a product found but not bought is a direct revenue loss. Measures whether visitors convert after landing on a product page. Benchmarked against your catalog average.<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:4px;margin-bottom:3px\">\n            <div style=\"width:65%;height:4px;border-radius:99px;background:var(--green)\"><\u002Fdiv>\n            <span style=\"font-size:9px;color:var(--gray-500)\">Weight in formula — 65%<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:9px;color:var(--gray-400);margin-top:4px\">Source: GA4 · view_item, add_to_cart, purchase events at SKU level<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- S3 -->\n        <div style=\"background:var(--amber-light);border:1px solid #fcd34d;border-radius:var(--r-md);padding:12px 14px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:5px\">\n            <div style=\"display:flex;align-items:center;gap:6px\">\n              <span style=\"font-size:9px;font-weight:700;background:var(--amber-light);color:var(--amber);padding:1px 6px;border-radius:3px;border:1px solid #fcd34d;font-family:'DM Mono',monospace\">Data Quality<\u002Fspan>\n              <div style=\"font-size:11px;font-weight:700;color:var(--navy)\">Data Quality Score<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-size:9px;font-family:'DM Mono',monospace;font-weight:700;color:var(--amber);padding:2px 8px;border-radius:3px;background:rgba(255,255,255,.6)\">× multiplier<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:10px;color:var(--gray-700);margin-bottom:7px\"><strong>Completeness modifier<\u002Fstrong> — amplifies priority when data is incomplete. Suppresses it when data is already complete. Amplifies priority when data is missing. Suppresses it when data is already complete. This is the relevance gate: it ensures Ascend only flags SKUs where enrichment is the correct fix.<\u002Fdiv>\n          <div style=\"display:flex;gap:6px;margin-bottom:4px\">\n            <span style=\"font-size:9px;font-weight:600;background:#fff;color:var(--navy);padding:2px 7px;border-radius:3px\">Tier 1 (60%) — Purchase decision attrs<\u002Fspan>\n            <span style=\"font-size:9px;font-weight:600;background:#fff;color:var(--navy);padding:2px 7px;border-radius:3px\">Tier 2 (30%) — Search findability<\u002Fspan>\n            <span style=\"font-size:9px;font-weight:600;background:#fff;color:var(--navy);padding:2px 7px;border-radius:3px\">Tier 3 (10%) — Conversion copy<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:9px;color:var(--amber);margin-top:4px\">Source: Akeneo PIM · attribute completeness per tier, per category schema<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Formula bar -->\n      <div style=\"background:var(--navy);border-radius:var(--r-md);padding:12px 16px;margin-bottom:10px\">\n        <div style=\"font-size:9px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px\">Priority Score Formula (MVP — Studio Version)<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;flex-wrap:wrap\">\n          <span style=\"font-family:'DM Mono',monospace;font-weight:700;font-size:12px;color:#fff\">Score<\u002Fspan>\n          <span style=\"color:rgba(255,255,255,.4);font-size:12px\">=<\u002Fspan>\n          <span style=\"font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,.45)\">(<\u002Fspan>\n          <span style=\"font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:#93c5fd\">Search × 0.35<\u002Fspan>\n          <span style=\"color:rgba(255,255,255,.4);font-size:12px\">+<\u002Fspan>\n          <span style=\"font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:#6ee7b7\">Conversion × 0.65<\u002Fspan>\n          <span style=\"font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,.45)\">)<\u002Fspan>\n          <span style=\"color:rgba(255,255,255,.4);font-size:12px\">×<\u002Fspan>\n          <span style=\"font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:#fcd34d\">Data Quality<\u002Fspan>\n          <span style=\"margin-left:auto;font-size:10px;color:rgba(255,255,255,.4)\">Low score = Red = Urgent<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Score bands -->\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:6px\">\n        <div style=\"background:var(--red-light);border:1px solid #fecdd3;border-radius:var(--r-md);padding:9px 11px;text-align:center\">\n          <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;color:var(--red);margin-bottom:2px\">0 – 40<\u002Fdiv>\n          <div style=\"font-size:9px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px\">🔴 Urgent<\u002Fdiv>\n          <div style=\"font-size:9px;color:var(--gray-600)\">ENRICH or INVESTIGATE<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--amber-light);border:1px solid #fcd34d;border-radius:var(--r-md);padding:9px 11px;text-align:center\">\n          <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;color:var(--amber);margin-bottom:2px\">41 – 69<\u002Fdiv>\n          <div style=\"font-size:9px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px\">🟡 Moderate<\u002Fdiv>\n          <div style=\"font-size:9px;color:var(--gray-600)\">ENRICH or INVESTIGATE<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--green-light);border:1px solid #6ee7b7;border-radius:var(--r-md);padding:9px 11px;text-align:center\">\n          <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;color:var(--green);margin-bottom:2px\">70 – 100<\u002Fdiv>\n          <div style=\"font-size:9px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px\">🟢 Healthy<\u002Fdiv>\n          <div style=\"font-size:9px;color:var(--gray-600)\">MONITOR<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Priority Engine -->\n  <div class=\"card mb20\">\n    <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:14px\">\n      <div style=\"width:28px;height:28px;border-radius:var(--r-md);background:var(--navy-light);display:flex;align-items:center;justify-content:center;flex-shrink:0\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M2 4h10M2 7h7M2 10h5\" stroke=\"var(--navy)\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div><div style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:var(--navy)\">Priority Engine — Action Tags<\u002Fdiv><div style=\"font-size:10px;color:var(--gray-500)\">Every SKU gets a score, a colour, and a tag that tells you exactly what to do next<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px\">\n      <div style=\"padding:14px;background:var(--red-light);border:1px solid #fecdd3;border-radius:var(--r-md)\">\n        <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:8px\">\n          <span style=\"font-size:9px;font-weight:700;background:var(--red);color:#fff;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px\">ENRICH<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--gray-700);line-height:1.6;margin-bottom:8px\">Any Tier 1 attribute is missing. Experience is breaking down <em>and<\u002Fem> data is incomplete. Enrichment will fix it. Ascend owns execution — queue it and we handle the rest.<\u002Fdiv>\n        <div style=\"font-size:10px;font-weight:600;color:var(--red)\">Condition: Tier 1 attributes incomplete<\u002Fdiv>\n        <div style=\"margin-top:5px;font-size:10px;color:var(--gray-500)\">Data Quality confirms enrichment is the right intervention<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:14px;background:var(--amber-light);border:1px solid #fcd34d;border-radius:var(--r-md)\">\n        <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:8px\">\n          <span style=\"font-size:9px;font-weight:700;background:var(--amber);color:#fff;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px\">INVESTIGATE<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--gray-700);line-height:1.6;margin-bottom:8px\">Tier 1 is 100% complete — but the experience gap still exists. This is <em>not<\u002Fem> an enrichment problem. Escalate to merchandising, pricing, or demand team for root cause.<\u002Fdiv>\n        <div style=\"font-size:10px;font-weight:600;color:var(--amber)\">Condition: Tier 1 complete · gap persists<\u002Fdiv>\n        <div style=\"margin-top:5px;font-size:10px;color:var(--gray-500)\">Ascend surfaces the signal. Does not own the fix.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:14px;background:var(--green-light);border:1px solid #6ee7b7;border-radius:var(--r-md)\">\n        <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:8px\">\n          <span style=\"font-size:9px;font-weight:700;background:var(--green);color:#fff;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px\">MONITOR<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--gray-700);line-height:1.6;margin-bottom:8px\">Score ≥ 70. No significant experience gap. No immediate action needed — review quarterly. Ascend tracks for degradation and will re-flag if score drops below threshold.<\u002Fdiv>\n        <div style=\"font-size:10px;font-weight:600;color:var(--green)\">Condition: Score ≥ 70 · low gap<\u002Fdiv>\n        <div style=\"margin-top:5px;font-size:10px;color:var(--gray-500)\">Watch for degradation over time.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:12px;padding:12px 14px;background:var(--navy-light);border-radius:var(--r-md);font-size:11px;color:var(--navy);line-height:1.6;display:flex;gap:10px;align-items:flex-start\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" style=\"flex-shrink:0;margin-top:1px\"><circle cx=\"7\" cy=\"7\" r=\"6\" stroke=\"var(--navy)\" stroke-width=\"1.2\"><\u002Fcircle><path d=\"M7 5v3M7 9.5v.5\" stroke=\"var(--navy)\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <div><strong>How it works:<\u002Fstrong> Each month, your catalog owner reviews the Priority Engine. SKUs tagged ENRICH go into the queue with one click — Pivotree handles normalization, enrichment, and QA. INVESTIGATE flags go to your merchandising or demand team. MONITOR items are tracked automatically. Scores update within 48–72 hours of publish.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Meet Your Catalog Operations Team -->\n  <div class=\"card\" style=\"margin-top:16px\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\">\n      <div>\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:14px;color:var(--navy)\">Meet Your Catalog Operations Team<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--gray-500);margin-top:2px\">When you work with Ascend, you're not buying software — you're engaging a team of catalog experts. This is the capability model behind every enrichment program.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex-shrink:0;margin-left:20px;background:var(--navy-light);border-radius:var(--r-md);padding:6px 12px;font-size:10px;font-weight:700;color:var(--navy);white-space:nowrap\">RI + AI · Real Intelligence + Artificial Intelligence<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:var(--navy-light);border-radius:var(--r-md);padding:12px 16px;margin-bottom:20px;font-size:12px;color:var(--navy);line-height:1.7\">\n      <strong>Our approach:<\u002Fstrong> AI enhances productivity and scales execution. Humans drive the strategy and deliver the results. Every SKU enriched by Ascend passes through expert human review — because catalog quality is too important to leave entirely to automation.\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:14px\">\n\n      <!-- Taxonomist -->\n      <div style=\"background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:16px;text-align:center\">\n        <div style=\"width:52px;height:52px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-family:'Poppins',sans-serif;font-weight:700;font-size:16px;color:#fff;letter-spacing:.5px\">TX<\u002Fdiv>\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:12px;color:var(--navy);margin-bottom:2px\">Taxonomist<\u002Fdiv>\n        <div style=\"font-size:10px;color:var(--teal);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px\">Strategy<\u002Fdiv>\n        <div style=\"font-size:10px;color:var(--gray-500);line-height:1.6;margin-bottom:10px\">Designs your category schema, attribute hierarchy, and product family structure. Defines what \"complete\" means for every SKU in your catalog.<\u002Fdiv>\n        <div style=\"background:var(--navy-light);border-radius:var(--r-md);padding:7px 10px;font-size:10px;color:var(--navy);line-height:1.5;text-align:left\">\n          <strong>For you:<\u002Fstrong> Akeneo channel setup, schema per product family, attribute requirement definition before day one.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Governance -->\n      <div style=\"background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:16px;text-align:center\">\n        <div style=\"width:52px;height:52px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-family:'Poppins',sans-serif;font-weight:700;font-size:16px;color:#fff;letter-spacing:.5px\">GV<\u002Fdiv>\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:12px;color:var(--navy);margin-bottom:2px\">Governance Lead<\u002Fdiv>\n        <div style=\"font-size:10px;color:var(--teal);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px\">Standards<\u002Fdiv>\n        <div style=\"font-size:10px;color:var(--gray-500);line-height:1.6;margin-bottom:10px\">Enforces data standards and quality thresholds across every enriched SKU. Ensures consistency, compliance, and score reliability throughout the program.<\u002Fdiv>\n        <div style=\"background:var(--navy-light);border-radius:var(--r-md);padding:7px 10px;font-size:10px;color:var(--navy);line-height:1.5;text-align:left\">\n ES<\u002Fdiv>\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:12px;color:var(--navy);margin-bottom:2px\">Enrichment Specialist<\u002Fdiv>\n        <div style=\"font-size:10px;color:var(--teal);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px\">Execution<\u002Fdiv>\n        <div style=\"font-size:10px;color:var(--gray-500);line-height:1.6;margin-bottom:10px\">Sources, populates, and normalizes attribute data at scale. AI surfaces candidates and auto-populates where confidence is high — humans review, validate, and approve every output.<\u002Fdiv>\n        <div style=\"background:var(--navy-light);border-radius:var(--r-md);padding:7px 10px;font-size:10px;color:var(--navy);line-height:1.5;text-align:left\">\n          <strong>For you:<\u002Fstrong> Every SKU in the queue enriched against your approved schema — classified, attributed, normalized, and QA'd before it reaches your PIM.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Analytics Lead -->\n      <div style=\"background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:16px;text-align:center\">\n        <div style=\"width:52px;height:52px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-family:'Poppins',sans-serif;font-weight:700;font-size:16px;color:#fff;letter-spacing:.5px\">AL<\u002Fdiv>\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:12px;color:var(--navy);margin-bottom:2px\">Analytics Lead<\u002Fdiv>\n        <div style=\"font-size:10px;color:var(--teal);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px\">Intelligence<\u002Fdiv>\n        <div style=\"font-size:10px;color:var(--gray-500);line-height:1.6;margin-bottom:10px\">Interprets your scoring data, surfaces patterns and opportunities, and feeds insights back into prioritization. Turns numbers into decisions your team can act on.<\u0 lid var(--gray-200)\">\n        <div class=\"msg msg-a\"><div class=\"ai-av\">PT<\u002Fdiv><div class=\"bub-a\"><div class=\"typing\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"chat-bar\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" style=\"color:var(--gray-400);cursor:pointer;flex-shrink:0\" onclick=\"showToast('CSV upload ready','↑')\"><path d=\"M7 1v8M4 4l3-3 3 3M2 10v1.5a.5.5 0 00.5.5h9a.5.5 0 00.5-.5V10\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <input class=\"chat-inp\" id=\"chat-inp\" placeholder=\"Ask about scores, revenue impact, return rates, margin, pipeline...\" onkeydown=\"if(event.key==='Enter')sendChat()\">\n        <button class=\"chat-send\" onclick=\"sendChat()\">Send<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== LIBRARY ===== -->\n<div id=\"tab-library\" class=\"tab\">\n  <div class=\"sec-hdr mb20\">\n    <div><div class=\"sec-ttl\" style=\"font-size:18px\">Pivotree Product Library<\u002Fdiv><div style=\"font-size:12px;color:var(--gray-500);margin-top:2px\">11,247,000+ enriched SKUs across 2,400+ brands<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-bottom:18px\"><input class=\"lib-sb\" placeholder=\"Search — try 'gate valve', 'LED fixture', '20A breaker'...\" id=\"lib-inp\" onkeydown=\"if(event.key==='Enter')libSearch()\"><\u002Fdiv>\n  <div class=\"lib-wrap\">\n    <div class=\"lib-filt\">\n      <div class=\"card\">\n        <div class=\"filt-sec\"><div class=\"filt-lbl\">Category<\u002Fdiv>\n          <label class=\"filt-opt\"><input type=\"checkbox\" checked=\"\"> Electrical<\u002Flabel>\n          <label class=\"filt-opt\"><input type=\"checkbox\" checked=\"\"> HVAC<\u002Flabel>\n          <label class=\"filt-opt\"><input type=\"checkbox\" checked=\"\"> Plumbing<\u002Flabel>\n id #fde68a;text-align:center\"><div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:22px;color:var(--amber)\">435<\u002Fdiv><div style=\"font-size:10px;color:var(--amber);font-weight:600;margin-top:3px\">Partial<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:13px;border-radius:var(--r-md);background:var(--red-light);border:1px solid #fecdd3;text-align:center\"><div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:22px;color:var(--red)\">353<\u002Fdiv><div style=\"font-size:10px;color:var(--red);font-weight:600;margin-top:3px\">No Match<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:12px;display:flex;gap:8px\">\n            <button class=\"btn btn-p\" onclick=\"showToast('847 matches sent to queue','→')\">Send All Matches to Queue<\u002Fbutton>\n            <button class=\"btn btn-s\" onclick=\"document.getElementById('match-res').style.display='none';document.getElementById('match-up').style.display='block'\">Reset<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- MODAL -->\n<div class=\"moverlay\" id=\"modal\">\n  <div class=\"modal\">\n    <div id=\"modal-form\">\n      <div class=\"modal-ttl\">Add to Catalog<\u002Fdiv>\n      <div class=\"modal-sub\">Import a manufacturer file or product list to start the enrichment process.<\u002Fdiv>\n      <label class=\"fl\">Process Type<\u002Flabel>\n      <select class=\"fs\"><option>New Product Introduction<\u002Foption><option>Manufacturer Data Refresh<\u002Foption><option>SKU ID Match<\u002Foption><\u002Fselect>\n      <div style=\"margin-bottom:12px\"><a href=\"#\" style=\"font-size:11px;color:var(--navy)\" onclick=\"showToast('Template downloaded','↓')\">Download template<\u002Fa><\u002Fdiv>\n      <label class=\"fl\">Upload File<\u002Flabel>\n      <div class=\"ua\" id=\"modal-ua\" onclick=\"modalUp()\" style=\"margin-bottom:12px;padding:20px\">\n        <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\" style=\"margin-bottom:6px\"><rect x=\"4\" y=\"6\" width=\"20\" height=\"16\" rx=\"2\" stroke=\"var(--gray-400)\" stroke-width=\"1.5\"><\u002Frect><path d=\"M14 10v6M11 13l3-3 3 3\" stroke=\"var(--gray-400)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <div style=\"font-weight:600;color:var(--gray-700);font-size:12px\">Choose CSV or drag &amp; drop<\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"modal-map\" style=\"display:none;margin-bottom:12px\">\n        <div style=\"font-size:11px;font-weight:600;color:var(--navy);margin-bottom:7px\">Column Mapping Preview<\u002Fdiv>\n        <table class=\"dt\" style=\"font-size:11px\"><thead><tr><th>Your Column<\u002Fth><th>Mapped To<\u002Fth><th>Status<\u002Fth><\u002Ftr><\u002Fthead><tbody>\n          <tr><td>part_number<\u002Ftd><td>SKU ID<\u002Ftd><td style=\"color:var(--green)\">Matched<\u002Ftd><\u002Ftr>\n          <tr><td>product_name<\u002Ftd><td>Product Title<\u002Ftd><td style=\"color:var(--green)\">Matched<\u002Ftd><\u002Ftr>\n          <tr><td>category_code<\u002Ftd><td>Category<\u002Ftd><td style=\"color:var(--amber)\">Review<\u002Ftd><\u002Ftr>\n        <\u002Ftbody><\u002Ftable>\n      <\u002Fdiv>\n      <div class=\"macts\"><button class=\"btn btn-s\" onclick=\"closeModal()\">Cancel<\u002Fbutton><button class=\"btn btn-p\" onclick=\"modalSubmit()\">Upload to Queue<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"modal-suc\" style=\"display:none;text-align:center;padding:18px 0\">\n      <div style=\"width:44px;height:44px;background:var(--green-light);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;margin:0 auto 12px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M4 10l4 4 8-8\" stroke=\"var(--green)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-family:'Poppins',sans-serif;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px\">1,200 SKUs Uploaded<\u002Fdiv>\n      <div style=\"font-size:12px;color:var(--gray-500);line-height:1.6;margin-bottom:18px\">Items will begin processing in the Normalization phase.<\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;gap:8px\"><button class=\"btn btn-p\" onclick=\"closeModal();switchTab('operations',null)\">View Pipeline<\u002Fbutton><button class=\"btn btn-s\" onclick=\"closeModal()\">Done<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ASSIGN MODAL -->\n<div class=\"moverlay\" id=\"assign-modal\">\n  <div class=\"modal\" style=\"width:420px\">\n    <div class=\"modal-ttl\">Assign for Review<\u002Fdiv>\n    <div class=\"modal-sub\" id=\"assign-item-label\">Assign this item to a team member for investigation or monitoring.<\u002Fdiv>\n    <label class=\"fl\">Team Member<\u002Flabel>\n    <select class=\"fs\" id=\"assign-to\">\n      <option>Sarah Chen — Merchandising<\u002Foption>\n      <option>James Okafor — Catalog Ops<\u002Foption>\n      <option>Priya Nair — eCommerce<\u002Foption>\n      <option>Tom Walsh — Demand Planning<\u002Foption>\n    <\u002Fselect>\n    <label class=\"fl\">Note (optional)<\u002Flabel>\n    <input class=\"fs\" id=\"assign-note\" placeholder=\"e.g. Check pricing — T1 complete but CTR is low\">\n    <label class=\"fl\">Due Date<\u002Flabel>\n    <input class=\"fs\" type=\"date\" id=\"assign-due\" value=\"2026-05-15\">\n    <div class=\"macts\">\n      <button class=\"btn btn-s\" onclick=\"document.getElementById('assign-modal').classList.remove('open')\">Cancel<\u002Fbutton>\n      <button class=\"btn btn-p\" onclick=\"submitAssign()\">Assign Task<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"tc\" id=\"tc\"><\u002Fdiv>\n\n<script>\ndocument.getElementById('ld').textContent=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});\n\nfunction switchTab(id,btn){\n  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));\n  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));\n  document.getElementById('tab-'+id).classList.add('active');\n  if(btn)btn.classList.add('active');\n  else document.querySelectorAll('.tbtn').forEach(b=>{if(b.dataset.tab===id)b.classList.add('active');});\n  if(id==='operations')setTimeout(drawGrowthChart,100);\n  if(id==='howitworks')setTimeout(drawLoopDiagram,50);\n  if(id==='strategic'){setTimeout(()=>{applyF();resetDrill();renderHeatmap();},50);}\n}\nfunction openLib(){\n  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));\n  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));\n  document.getElementById('tab-library').classList.add('active');\n  initLib();\n}\nfunction showToast(msg,icon='→'){\n  const c=document.getElementById('tc'),t=document.createElement('div');\n  t.className='toast';t.innerHTML=`<span class=\"ti2\">${icon}<\u002Fspan><span>${msg}<\u002Fspan>`;\n  c.appendChild(t);setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),350);},3000);\n}\n\nfunction openAssign(name) {\n  document.getElementById('assign-item-label').textContent = 'Assign \"' + name + '\" to a team member for investigation or monitoring.';\n  document.getElementById('assign-modal').classList.add('open');\n}\nfunction submitAssign() {\n  var to = document.getElementById('assign-to').value.split('—')[0].trim();\n  document.getElementById('assign-modal').classList.remove('open');\n  showToast('Task assigned to ' + to, '✓');\n}\ndocument.getElementById('assign-modal').addEventListener('click', function(e) {\n  if (e.target === this) this.classList.remove('open');\n});\n\nfunction flagForReview(){showToast(\"Flagged for merchandising review\",\"!\");}\nfunction addQ(btn,name){btn.className='btn btn-q btn-sm';btn.textContent='Queued';btn.disabled=true;showToast(name+' added to queue');}\n\n// MODAL\nlet muploaded=false;\nfunction openModal(){document.getElementById('modal').classList.add('open');document.getElementById('modal-form').style.display='block';document.getElementById('modal-suc').style.display='none';document.getElementById('modal-map').style.display='none';muploaded=false;}\nfunction closeModal(){document.getElementById('modal').classList.remove('open');}\ndocument.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});\nfunction modalUp(){if(!muploaded){muploaded=true;document.getElementById('modal-ua').innerHTML='<div style=\"font-size:12px;font-weight:600;color:var(--green)\">summitsupply_new_products.csv ready<\u002Fdiv>';document.getElementById('modal-map').style.display='block';}}\nfunction modalSubmit(){if(!muploaded){showToast('Please select a file first');return;}document.getElementById('modal-form').style.display='none';document.getElementById('modal-suc').style.display='block';showToast('1,200 SKUs added to queue');}\n\n// ===== FINANCIAL IMPACT =====\nconst finData={\n  post:{rev:'$4.82M',revDelta:'+$1.14M vs pre',aov:'$847',aovDelta:'+$112 vs pre',conv:'12.4%',convDelta:'+3.1pp vs pre',ret:'7.8%',retDelta:'−4.2pp vs pre'},\n  pre:{rev:'$3.68M',revDelta:'Before enrichment',aov:'$735',aovDelta:'Before enrichment',conv:'9.3%',convDelta:'Before enrichment',ret:'12.0%',retDelta:'Before enrichment'}\n};\nlet finView='post';\nfunction setFinView(v){\n  finView=v;\n  document.getElementById('fin-pre').classList.toggle('active',v==='pre');\n  document.getElementById('fin-post').classList.toggle('active',v==='post');\n  renderFinCards();\n}\nfunction renderFinCards(){\n  const d=finData[finView];\n  const isPost=finView==='post';\n  document.getElementById('fin-cards').innerHTML=`\n    <div class=\"fin-card\"><div class=\"fin-card-label\">Revenue / Product Page View<\u002Fdiv><div class=\"fin-card-val\">${d.rev}<\u002Fdiv><div class=\"fin-card-d -green)':s>=40?'var(--amber-mid)':'var(--red)';}\nfunction scTrack(s){return s>=70?'#6ee7b7':s>=40?'#fcd34d':'#fecdd3';}\nfunction scBg(s){return s>=70?'sbg-g':s>=40?'sbg-y':'sbg-r';}\nfunction scNum(s){return s>=70?'sg':s>=40?'sy':'sr';}\nfunction deltaHtml(d){\n  if(d>0)return`<span class=\"sdelta dup\">▲ +${Math.abs(d).toFixed(1)}%<\u002Fspan>`;\n  if(d<0)return`<span class=\"sdelta ddn\">▼ −${Math.abs(d).toFixed(1)}%<\u002Fspan>`;\n  return`<span class=\"sdelta dfl\">— 0.0%<\u002Fspan>`;\n}\nconst cardMeta=[\n  {id:'sp-find',label:'Data Quality',src:'Akeneo PIM · attribute completeness',key:'find'},\n  {id:'sp-search',label:'Search',src:'Google Search Console',key:'search'},\n  {id:'sp-buy',label:'Conversion',src:'GA4 + OroCommerce',key:'buy'},\n];\nfunction renderScorecards(p,key,filt){\n  const pl=activeDate==='30d'?'30 days':activeDate==='90d'?'90 days':activeDate==='6m'?'6 months':'12 months';\n  document.getElementById('scorecard-grid').innerHTML=cardMeta.map(m=>{\n    const d=p[m.key],dash=Math.round(314*(1-d.score/100));\n    return`<div class=\"card scard ${scBg(d.score)}\">\n      <svg class=\"sring\" width=\"100\" height=\"100\" viewBox=\"0 0 100 100\"><circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"${scTrack(d.score)}\" stroke-width=\"14\"/><circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"${scColor(d.score)}\" stroke-width=\"14\" stroke-dasharray=\"264\" stroke-dashoffset=\"${Math.round(264*(1-d.score/100))}\" stroke-linecap=\"round\" transform=\"rotate(-90 50 50)\"/><\u002Fsvg>\n      <div class=\"slbl\">${m.label}<\u002Fdiv>\n      <div class=\"snum ${scNum(d.score)}\">${d.score}<\u002Fdiv>\n      <div style=\"font-size:10px;color:var(--gray-500);margin:1px 0 4px\">/ 100<\u002Fdiv>\n      ${deltaHtml(d.delta)}\n      <div style=\"font-size:9px;color:var(--gray-400);margin-bottom:5px\">vs. previous ${pl}<\u002Fdiv>\n      <canvas id=\"${m.id}\" width=\"200\" height=\"38\" style=\"width:100%;height:38px;display:block\"><\u002Fcanvas>\n      <div style=\"font-size:10px;color:var(--gray-500);margin-top:5px\">${m.src}<\u002Fdiv>\n      ${filt?`<div style=\"font-size:9px;color:var(--gray-400);font-style:italic;margin-top:2px\">Filtered: ${key}<\u002Fdiv>`:''}\n    <\u002Fdiv>`;\n  }).join('');\n  requestAnimationFrame(()=>cardMeta.forEach(m=>drawSparkline(m.id,p[m.key].trend,scColor(p[m.key].score))));\n}\nfunction drawSparkline(id,vals,color){\n  const canvas=document.getElementById(id);if(!canvas)return;\n  const W=canvas.offsetWidth||200,H=38;canvas.width=W;canvas.height=H;\n  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);\n  const mn=Math.min(...vals)-4,mx=Math.max(...vals)+4,rng=mx-mn||1;\n  const pts=vals.map((v,i)=>({x:(i/(vals.length-1))*(W-8)+4,y:H-((v-mn)/rng)*(H-8)-4}));\n  ctx.beginPath();ctx.moveTo(pts[0].x,H);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,H);ctx.closePath();ctx.fillStyle=color.replace(')',',0.12)').replace('var(','rgba(').replace('--green','13,107,64').replace('--amber-mid','217,119,6').replace('--red','153,27,27');\n  try{ctx.fill();}catch(e){}\n  ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));\n  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.stroke();\n  const last=pts[pts.length-1];ctx.beginPath();ctx.arc(last.x,last.y,3,0,Math.PI*2);ctx.fillStyle=color;\n  try{ctx.fill();}catch(e){}\n}\n\nfunction renderExec(p,key,filt){\n  const period=drLabels[activeDate];\n  const avg=((p.search.delta+p.find.delta+p.buy.delta)/3).toFixed(1);\n  const avgS=Math.round((p.search.score+p.find.score+p.buy.score)/3);\n  const ctx=filt?`<strong>${key}<\u002Fstrong>`:'the full catalog';\n  const trend=parseFloat(avg)>0?`improved <span class=\"hl-g\">+${avg}%<\u002Fspan>`:parseFloat(avg)<0?`declined <span class=\"hl-r\">${avg}%<\u002Fspan>`:'remained flat';\n  let concern='';\n  if(!filt)concern='PVF remains the primary drag — <span class=\"hl-r\">21,300 SKUs at 43/100<\u002Fspan> with a 14.7% retu = 'Name,Tag,Score,Search,Conversion,Data Quality,SKUs,Gap/Review\\n';\n  const rows = all.map(r=>`\"${r.name}\",\"${r.tag}\",${r.score},${r.search},${r.conv},\"${r.dq}\",\"${r.skus}\",\"${r.gap||r.review||''}\"`).join('\\n');\n  const blob = new Blob([header+rows], {type:'text/csv'});\n  const a = document.createElement('a');\n  a.href = URL.createObjectURL(blob);\n  a.download = 'priority_engine_export.csv';\n  a.click();\n  showToast('Priority Engine exported to CSV','↓');\n}\n\n// ── SEARCH / FILTER FUNCTIONS ─────────────────────────────────────────────────\n\nfunction filterDrill(q) {\n  var term = q.toLowerCase().trim();\n  var rows = document.querySelectorAll('#drill-wrap tbody tr');\n  rows.forEach(function(row) {\n    var text = row.textContent.toLowerCase();\n    row.style.display = (!term || text.includes(term)) ? '' : 'none';\n  });\n}\n\nfunction filterPE(q) {\n  var term = q.toLowerCase().trim();\n  ['enrich','inv','mon'].forEach(function(type) {\n    var rows = document.querySelectorAll('#pe-' + type + '-body tr');\n    rows.forEach(function(row) {\n      var text = row.textContent.toLowerCase();\n      row.style.display = (!term || text.includes(term)) ? '' : 'none';\n    });\n  });\n}\n\n// Clear PE search when toggling view\nvar _origSetPEView = typeof setPEView === 'function' ? setPEView : null;\n\n// Initialise on first load\nsetTimeout(renderPE, 200);\nsetTimeout(applyF, 50);\nsetTimeout(resetDrill, 50);\n\nsetTimeout(()=>{if(document.getElementById('tab-operations').classList.contains('active'))drawGrowthChart();},150);\n\n/* ============================================================\n   COMPLETENESS & THROUGHPUT DASHBOARD\n   ============================================================ */\nconst COMP_DATA = {\n  // Tier coverage % by category (current period)\n  cats: [\n    {name:'Lighting',     skus:1842, t1:96, t2:84, t3:67, addM:18420, addQ:54100, addY:198400, brands:['Philips Signify','Eaton']},\n    {name:'Electrical',   skus:2104, t1:
