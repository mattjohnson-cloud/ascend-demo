00,t2:12400,t3: 9600},\n    {m:'Jul',t1:16400,t2:13100,t3:10200},\n    {m:'Aug',t1:17200,t2:13900,t3:10800},\n    {m:'Sep',t1:18100,t2:14700,t3:11400},\n    {m:'Oct',t1:19400,t2:15600,t3:12100},\n    {m:'Nov',t1:20300,t2:16400,t3:12800},\n    {m:'Dec',t1:18900,t2:15200,t3:11700},\n    {m:'Jan',t1:21200,t2:17100,t3:13400},\n    {m:'Feb',t1:22400,t2:18200,t3:14200},\n    {m:'Mar',t1:23900,t2:19600,t3:15100},\n    {m:'Apr',t1:25100,t2:20800,t3:16300},\n  ]\n};\n\nlet compPeriod = 'quarter';\nlet compView = 'cat';\n\nfunction setCompPeriod(p, btn) {\n  compPeriod = p;\n  document.querySelectorAll('[data-comp-per]').forEach(b => b.classList.remove('active'));\n  btn.classList.add('active');\n  renderComp();\n}\nfunction setCompView(v) {\n  compView = v;\n  document.getElementById('comp-tog-cat').classList.toggle('active', v === 'cat');\n  document.getElementById('comp-tog-brand').classList.toggle('active', v === 'brand');\n  renderComp();\n}\nfunction resetCompFilters() {\n  document.getElementById('comp-cat-f').value = 'all';\n  document.getElementById('comp-brand-f').value = 'all';\n  renderComp();\n}\nfunction exportComp() {\n  alert('Report queued — CSV will arrive in your inbox in ~30 seconds.\\n\\n(Demo: this would generate a Tier 1/2/3 coverage + throughput export filtered to your current view.)');\n}\n\nfunction compFiltered() {\n  const catF = document.getElementById('comp-cat-f').value;\n  const brandF = document.getElementById('comp-brand-f').value;\n  const isFiltered = catF !== 'all' || brandF !== 'all';\n  document.getElementById('comp-reset').style.display = isFiltered ? 'inline-flex' : 'none';\n\n  // Build subset of cats and brands matching filters\n  let cats = COMP_DATA.cats.slice();\n  let brands = COMP_DATA.brands.slice();\n  if (catF !== 'all') {\n    cats = cats.filter(c => c.name === catF);\n    brands = brands.filter(b => b.cats.includes(catF));\n  }\n  if (brandF !== 'all') {\n    brands = brands.filter(b => b.name === brandF);\n    cats = cats.filter(c => c.brands.includes(brandF));\n  }\n  return {cats, brands, catF, brandF, isFiltered};\n}\n\nfunction renderComp() {\n  const {cats, brands, catF, brandF, isFiltered} = compFiltered();\n\n  // Period multiplier key\n  const pk = compPeriod === 'month' ? 'addM' : compPeriod === 'quarter' ? 'addQ' : 'addY';\n  const periodLbl = compPeriod === 'month' ? 'month' : compPeriod === 'quarter' ? 'quarter' : 'YTD';\n  const periodLblCap = compPeriod === 'month' ? 'This Month' : compPeriod === 'quarter' ? 'This Quarter' : 'YTD';\n\n  // Aggregate weighted by SKU\n  const agg = (rows) => {\n    const totalSku = rows.reduce((s,r)=>s+r.skus, 0) || 1;\n    return {\n      skus: totalSku,\n      t1: rows.reduce((s,r)=>s+r.t1*r.skus,0) / totalSku,\n      t2: rows.reduce((s,r)=>s+r.t2*r.skus,0) / totalSku,\n      t3: rows.reduce((s,r)=>s+r.t3*r.skus,0) / totalSku,\n      added: rows.reduce((s,r)=>s+r[pk],0),\n    };\n  };\n  const A = agg(cats.length ? cats : COMP_DATA.cats);\n\n  // Context label\n  const ctxParts = [];\n  if (catF !== 'all') ctxParts.push(catF);\n  if (brandF !== 'all') ctxParts.push(brandF);\n  const ctxLbl = ctxParts.length ? `Filtered to ${ctxParts.join(' · ')}` : 'Across full Tier 1 catalog';\n  document.getElementById('comp-context-lbl').textContent = ctxLbl;\n\n  // Tier ring cards\n  const tierDefs = [\n    {tag:'t1', name:'Tier 1', label:'Required', desc:'Title, brand, MPN, UPC, primary image, category', pct:A.t1, target:98, delta:'+3.2 pts QoQ'},\n    {tag:'t2', name:'Tier 2', label:'Commercial', desc:'Specs, features, dimensions, materials, compliance', pct:A.t2, target:90, delta:'+5.8 pts QoQ'},\n    {tag:'t3', name:'Tier 3', label:'Rich content', desc:'Long copy, comparisons, applications, A+ assets, video', pct:A.t3, target:75, delta:'+7.4 pts QoQ'},\n  ];\n  ['comp-tier1','comp-tier2','comp-tier3'].forEach((id, i) => {\n    const t = tierDefs[i];\n    const color = i===0 ? '#1e3a8a' : i===1 ? '#0d9488' : '#7aa3d9';\n    const r = 30, c = 2*Math.PI*r, off = c * (1 - t.pct/100);\n    document.getElementById(id).innerHTML = `\n      <div class=\"ring-wrap\">\n        <svg width=\"74\" height=\"74\" viewBox=\"0 0 74 74\">\n          <circle cx=\"37\" cy=\"37\" r=\"${r}\" stroke=\"#e5e7eb\" stroke-width=\"6\" fill=\"none\"/>\n          <circle cx=\"37\" cy=\"37\" r=\"${r}\" stroke=\"${color}\" stroke-width=\"6\" fill=\"none\"\n                  stroke-dasharray=\"${c}\" stroke-dashoffset=\"${off}\"\n                  transform=\"rotate(-90 37 37)\" stroke-linecap=\"round\"/>\n        <\u002Fsvg>\n        <div class=\"ring-pct\">${t.pct.toFixed(0)}%<small>complete<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tier-meta\">\n        <div class=\"tier-name\">${t.name} <span class=\"tier-tag ${t.tag}\">${t.label}<\u002Fspan><\u002Fdiv>\n        <div class=\"tier-desc\">${t.desc}<\u002Fdiv>\n        <div class=\"tier-stats\">\n          <span>Target <strong>${t.target}%<\u002Fstrong><\u002Fspan>\n          <span class=\"tier-delta\">${t.delta}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n  });\n\n  // Throughput KPI card\n  const periodAttrs = A.added;\n  const periodSkus = Math.round(periodAttrs / 11);  // ~11 attrs per SKU avg\n  const avgPerSku = (periodAttrs / Math.max(periodSkus,1)).toFixed(1);\n  document.getElementById('comp-thru').innerHTML = `\n    <div>\n      <div class=\"lbl\">Attributes Added · ${periodLblCap}<\u002Fdiv>\n      <div class=\"big\">${(periodAttrs/1000).toFixed(1)}K<\u002Fdiv>\n      <div class=\"sub\">net new and corrected attributes published by the Pivotree team${isFiltered ? ' for this filter' : ''}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"row\">\n      <div><div class=\"k\">SKUs touched<\u002Fdiv><div class=\"v\">${periodSkus.toLocaleString()}<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"k\">Avg / SKU<\u002Fdiv><div class=\"v\">${avgPerSku}<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"k\">vs prior period<\u002Fdiv><div class=\"v\" style=\"color:#a7f3d0\">+18%<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>`;\n\n  // Trend chart\n  drawCompTrend();\n\n  // Mix bars - show breakdown of attrs added by tier this period\n  const mixT1 = Math.round(periodAttrs * 0.35);\n  const mixT2 = Math.round(periodAttrs * 0.41);\n  const mixT3 = periodAttrs - mixT1 - mixT2;\n  const mixMax = Math.max(mixT1, mixT2, mixT3);\n  document.getElementById('comp-mix-bars').innerHTML = `\n    <div class=\"mix-row\">\n      <div class=\"lbl\">Tier 1<\u002Fdiv>\n      <div class=\"bar\"><div class=\"fill\" style=\"width:${mixT1/mixMax*100}%;background:var(--navy)\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"val\">${mixT1.toLocaleString()}<small>${(mixT1/periodAttrs*100).toFixed(0)}%<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mix-row\">\n      <div class=\"lbl\">Tier 2<\u002Fdiv>\n      <div class=\"bar\"><div class=\"fill\" style=\"width:${mixT2/mixMax*100}%;background:var(--teal)\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"val\">${mixT2.toLocaleString()}<small>${(mixT2/periodAttrs*100).toFixed(0)}%<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mix-row\">\n      <div class=\"lbl\">Tier 3<\u002Fdiv>\n      <div class=\"bar\"><div class=\"fill\" style=\"width:${mixT3/mixMax*100}%;background:#a3c4f3\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"val\">${mixT3.toLocaleString()}<small>${(mixT3/periodAttrs*100).toFixed(0)}%<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>`;\n\n  // Insight\n  const t1Gap = (98 - A.t1).toFixed(1);\n  const t3Gain = '7.4';\n  document.getElementById('comp-insight').innerHTML = isFiltered\n    ? `<strong>${ctxParts.join(' · ')}:<\u002Fstrong> Tier 1 sits ${t1Gap} pts from target. Pivotree is prioritizing Tier 2 specs this ${periodLbl} — that's where the merchandising lift compounds for this segment.`\n    : `<strong>Where the work went:<\u002Fstrong> 41% of period throughput went to Tier 2 specs — the layer that drives findability and filter quality. Tier 3 (rich content) has gained ${t3Gain} pts QoQ as the Pivotree team works through long-tail SKUs.`;\n\n  // Coverage table\n  document.getElementById('comp-table-sub').textContent =\n    compView === 'cat'\n      ? `Tier 1 / 2 / 3 completeness and attributes added this ${periodLbl}, by category`\n      : `Tier 1 / 2 / 3 completeness and attributes added this ${periodLbl}, by brand`;\n\n  const head = document.getElementById('comp-table-head');\n  const body = document.getElementById('comp-table-body');\n  head.innerHTML = `\n    <th style=\"width:24%\">${compView === 'cat' ? 'Category' : 'Brand'}<\u002Fth>\n    <th style=\"text-align:right\">SKUs<\u002Fth>\n    <th>Tier 1<\u002Fth>\n    <th>Tier 2<\u002Fth>\n    <th>Tier 3<\u002Fth>\n    <th style=\"text-align:right\">Attrs added (${periodLblCap})<\u002Fth>\n    <th style=\"text-align:right;width:10%\">Avg / SKU<\u002Fth>`;\n\n  const rows = (compView === 'cat' ? cats : brands).slice().sort((a,b) => b[pk] - a[pk]);\n  body.innerHTML = rows.map(r => {\n    const added = r[pk];\n    const avgPer = (added / r.skus).toFixed(1);\n    const bar = (pct, color) => `\n      <div style=\"display:flex;align-items:center;gap:6px\">\n        <div style=\"flex:1;height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden;min-width:60px\">\n          <div style=\"height:100%;width:${pct}%;background:${color};border-radius:3px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font-size:10px;font-weight:600;color:var(--navy);font-variant-numeric:tabular-nums;width:26px;text-align:right\">${pct}%<\u002Fspan>\n      <\u002Fdiv>`;\n    return `<tr>\n      <td style=\"font-weight:600;color:var(--navy)\">${r.name}<\u002Ftd>\n      <td style=\"text-align:right;font-variant-numeric:tabular-nums\">${r.skus.toLocaleString()}<\u002Ftd>\n      <td>${bar(r.t1, '#1e3a8a')}<\u002Ftd>\n      <td>${bar(r.t2, '#0d9488')}<\u002Ftd>\n      <td>${bar(r.t3, '#7aa3d9')}<\u002Ftd>\n      <td style=\"text-align:right;font-variant-numeric:tabular-nums;font-weight:600;color:var(--navy)\">${added.toLocaleString()}<\u002Ftd>\n      <td style=\"text-align:right;font-variant-numeric:tabular-nums;color:var(--gray-600)\">${avgPer}<\u002Ftd>\n    <\u002Ftr>`;\n  }).join('') || `<tr><td colspan=\"7\" style=\"text-align:center;padding:24px;color:var(--gray-500);font-size:11px\">No rows match the current filters.<\u002Ftd><\u002Ftr>`;\n\n  // Trend chart subtitle\n  document.getElementById('comp-trend-sub').textContent = isFiltered\n    ? `Last 12 months — stacked by tier (${ctxParts.join(' · ')})`\n    : 'Last 12 months — stacked by tier';\n}\n\nfunction drawCompTrend() {\n  const cv = document.getElementById('comp-trend');\n  if (!cv) return;\n  const dpr = window.devicePixelRatio || 1;\n  const W = cv.clientWidth || cv.offsetWidth || 600;\n  const H = 200;\n  cv.width = W * dpr; cv.height = H * dpr;\n  cv.style.height = H + 'px';\n  const ctx = cv.getContext('2d');\n  ctx.scale(dpr, dpr);\n  ctx.clearRect(0,0,W,H);\n\n  const data = COMP_DATA.trend;\n  // Scale current data by filter (rough): apply ratio of filtered SKUs to total\n  const {cats, isFiltered} = compFiltered();\n  const totalSku = COMP_DATA.cats.reduce((s,c)=>s+c.skus,0);\n  const subSku = (cats.length ? cats : COMP_DATA.cats).reduce((s,c)=>s+c.skus,0);\n  const ratio = isFiltered ? subSku/totalSku : 1;\n\n  const padL = 40, padR = 12, padT = 12, padB = 26;\n  const innerW = W - padL - padR, innerH = H - padT - padB;\n\n  const max = Math.max(...data.map(d => (d.t1 + d.t2 + d.t3) * ratio));\n  const niceMax = Math.ceil(max/10000)*10000;\n\n  // Grid + Y labels\n  ctx.font = '10px Inter, sans-serif';\n  ctx.fillStyle = '#9ca3af';\n  ctx.textAlign = 'right';\n  ctx.textBaseline = 'middle';\n  for (let i = 0; i <= 4; i++) {\n    const y = padT + (innerH * i / 4);\n    const v = niceMax * (1 - i/4);\n    ctx.strokeStyle = '#f1f5f9';\n    ctx.lineWidth = 1;\n    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W-padR, y); ctx.stroke();\n    ctx.fillText((v/1000).toFixed(0)+'K', padL-5, y);\n  }\n\n  // Bars\n  const barW = innerW / data.length * 0.62;\n  const step = innerW / data.length;\n  ctx.textAlign = 'center';\n  ctx.textBaseline = 'top';\n  data.forEach((d, i) => {\n    const x = padL + step*i + (step-barW)/2;\n    const v1 = d.t1 * ratio, v2 = d.t2 * ratio, v3 = d.t3 * ratio;\n    const h1 = v1 / niceMax * innerH;\n    const h2 = v2 / niceMax * innerH;\n    const h3 = v3 / niceMax * innerH;\n    let yPos = padT + innerH;\n    // Tier 3 (top, lightest)\n    yPos -= h1;\n    ctx.fillStyle = '#1e3a8a';\n    ctx.fillRect(x, yPos, barW, h1);\n    yPos -= h2;\n    ctx.fillStyle = '#0d9488';\n    ctx.fillRect(x, yPos, barW, h2);\n    yPos -= h3;\n    ctx.fillStyle = '#a3c4f3';\n    ctx.fillRect(x, yPos, barW, h3);\n\n    // Month label\n    ctx.fillStyle = '#6b7280';\n    ctx.font = '10px Inter, sans-serif';\n    ctx.fillText(d.m, x + barW/2, padT + innerH + 6);\n  });\n}\n\n// Init completeness on operations tab activation\nsetTimeout(()=>{\n  if (document.getElementById('comp-card')) {\n    renderComp();\n  }\n}, 250);\nwindow.addEventListener('resize', () => {\n  if (document.getElementById('comp-card') && document.getElementById('tab-operations').classList.contains('active')) {\n    drawCompTrend();\n  }\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
